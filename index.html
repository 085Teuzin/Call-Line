<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceChat Pro</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        #controls { padding: 20px; background: #1f1f1f; display: flex; gap: 10px; justify-content: center; }
        button { padding: 15px 30px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .call { background: #4caf50; color: white; }
        .end { background: #f44336; color: white; }
        input { padding: 15px; border-radius: 25px; border: none; flex: 1; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="controls">
        <input type="text" id="msgInput" placeholder="Mensagem...">
        <button onclick="enviarMsg()">Enviar</button>
        <button class="call" onclick="iniciarChamada()">Ligar</button>
        <button class="end" onclick="encerrarChamada()">Desligar</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqRAsWfP4w-r82PZOaJcDck7W8Aeph3p8",
            databaseURL: "https://teuzin-games-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let localStream;
        let peerConnection;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function iniciarChamada() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.onicecandidate = e => { if (e.candidate) set(ref(db, 'calls/offer'), e.candidate); };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            set(ref(db, 'calls/offer'), { sdp: offer });
        }

        function enviarMsg() {
            const input = document.getElementById('msgInput');
            push(ref(db, 'chat'), { text: input.value, time: Date.now() });
            input.value = '';
        }

        onValue(ref(db, 'chat'), (snap) => {
            const chat = document.getElementById('chat');
            chat.innerHTML = Object.values(snap.val() || {}).map(m => `<div>${m.text}</div>`).join('');
        });

        window.encerrarChamada = () => {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
        };
    </script>
</body>
</html>
