<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Família Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131c2e;
            --text-main: #f3f4f6;
            --text-muted: #64748b;
            --border: #1e293b;
            --chat-bg: #070a12;
            --msg-in: #1e293b;
            --msg-out: #065f46;
            --accent: #10b981;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .app-card { background-color: var(--bg-card); border-color: var(--border); }
        .text-muted { color: var(--text-muted); }
        .border-custom { border-color: var(--border); }
        .chat-area { background-color: var(--chat-bg); }
        .msg-in { background-color: var(--msg-in); color: var(--text-main); }
        .msg-out { background-color: var(--msg-out); color: #ffffff; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col justify-between antialiased selection:bg-emerald-500/30">

    <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-4">
        <div class="app-card w-full max-w-sm p-6 border-2 flex flex-col items-center text-center shadow-[4px_4px_0px_0px_rgba(16,185,129,0.2)]">
            <div class="w-16 h-16 bg-emerald-600 border-2 border-emerald-400 flex items-center justify-center text-white text-3xl mb-4 shadow-[2px_2px_0px_0px_rgba(0,0,0,0.5)]">
                <i class="fas fa-terminal"></i>
            </div>
            <h1 class="text-xl font-black uppercase tracking-wider mb-1">Família Chat</h1>
            <p class="text-muted text-xs mb-6 uppercase tracking-tight">[ Conexão Privada Familiar ]</p>
            
            <div class="w-full text-left mb-5">
                <label class="block text-[10px] font-black uppercase tracking-widest mb-1.5 text-emerald-500">// Identificação</label>
                <input type="text" id="login-nickname" placeholder="Ex: Tio Joao" class="w-full p-3 border-2 border-custom bg-black/40 text-sm font-bold outline-none focus:border-emerald-500 text-white placeholder:text-slate-700">
            </div>

            <button id="btn-login" class="w-full bg-emerald-600 hover:bg-emerald-700 active:translate-y-0.5 text-white font-black uppercase text-xs p-3.5 border-2 border-emerald-400 flex items-center justify-center gap-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,0.4)] transition-all">
                <i class="fab fa-google text-sm"></i> Vincular Conta Google
            </button>
        </div>
    </div>

    <div id="screen-lobby" class="hide flex-1 flex flex-col p-4 max-w-sm mx-auto w-full justify-center">
        <div class="app-card border-2 p-5 shadow-[4px_4px_0px_0px_rgba(16,185,129,0.15)] w-full">
            <div class="flex items-center gap-3 border-b-2 border-custom pb-4 mb-5">
                <img id="lobby-avatar" src="" class="w-10 h-10 border-2 border-custom object-cover">
                <div class="overflow-hidden">
                    <span class="text-[9px] text-emerald-500 font-bold block uppercase tracking-wider">// Usuário Ativo</span>
                    <h2 class="font-black text-sm truncate uppercase tracking-tight" id="lobby-welcome">...</h2>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest mb-1 text-muted">ID da Sala (Sem espaços)</label>
                    <input type="text" id="room-name" placeholder="Ex: sala-principal" class="w-full p-2.5 border-2 border-custom bg-black/40 text-sm font-bold outline-none focus:border-emerald-500 text-white uppercase placeholder:text-slate-700">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest mb-1 text-muted">Chave de Segurança</label>
                    <input type="password" id="room-pass" placeholder="••••••••" class="w-full p-2.5 border-2 border-custom bg-black/40 text-sm font-bold outline-none focus:border-emerald-500 text-white placeholder:text-slate-700">
                </div>
                <button id="btn-join-room" class="w-full bg-emerald-600 hover:bg-emerald-700 active:translate-y-0.5 text-white font-black uppercase text-xs p-3 border-2 border-emerald-400 shadow-[2px_2px_0px_0px_rgba(0,0,0,0.3)] transition-all">
                    Acessar / Gerar Canal
                </button>
                <button id="btn-logout" class="w-full bg-transparent border-2 border-dashed border-red-500/40 hover:border-red-500 text-red-500/80 hover:text-red-500 font-bold uppercase text-[10px] p-2 transition-all mt-2">
                    Desconectar Sistema
                </button>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="hide flex-1 flex flex-col h-full w-full max-w-md mx-auto relative app-card border-x-2">
        <header class="h-14 px-3 border-b-2 border-custom flex items-center justify-between z-10 bg-slate-900/40 backdrop-blur-md">
            <div class="flex items-center gap-3 overflow-hidden">
                <button id="btn-back-lobby" class="text-muted hover:text-white px-1">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="overflow-hidden">
                    <h3 id="chat-room-title" class="font-black text-sm uppercase tracking-wider truncate">SALA</h3>
                    <span id="chat-user-role" class="text-[8px] font-black px-1.5 py-0.5 border tracking-widest uppercase">MEMBRO</span>
                </div>
            </div>
            <button id="btn-open-panel" class="w-9 h-9 border-2 border-custom flex items-center justify-center text-muted hover:text-white bg-black/20">
                <i class="fas fa-sliders-h text-xs"></i>
            </button>
        </header>

        <div id="chat-messages" class="flex-1 chat-area p-3 overflow-y-auto space-y-3 flex flex-col"></div>

        <div id="reply-preview" class="hide px-3 py-2 bg-emerald-500/10 border-t-2 border-custom flex items-center justify-between text-xs">
            <div class="border-l-2 border-emerald-500 pl-2 overflow-hidden">
                <span class="font-black block text-emerald-400 text-[9px] uppercase tracking-wider" id="reply-user">RESPONDENDO A</span>
                <p class="text-muted truncate text-[11px]" id="reply-text">...</p>
            </div>
            <button id="btn-cancel-reply" class="text-muted hover:text-white text-xs px-1">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="p-2 border-t-2 border-custom flex items-end gap-2 bg-slate-900/20 z-10">
            <div class="flex-1 bg-black/40 border-2 border-custom p-1.5 min-h-[40px] flex flex-col justify-end">
                <div id="edit-indicator" class="hide text-[8px] font-black text-amber-500 px-1 pb-1 flex justify-between items-center tracking-widest">
                    <span>// MODO EDIÇÃO</span>
                    <button id="btn-cancel-edit" class="text-muted font-normal text-xs"><i class="fas fa-times"></i></button>
                </div>
                <textarea id="msg-input" rows="1" placeholder="Digite aqui..." class="w-full bg-transparent outline-none resize-none px-1 max-h-24 overflow-y-auto text-xs font-bold text-white placeholder:text-slate-700" style="line-height: 16px;"></textarea>
            </div>
            <button id="btn-send" class="w-10 h-10 bg-emerald-600 hover:bg-emerald-700 border-2 border-emerald-400 flex items-center justify-center text-white flex-shrink-0 shadow-[2px_2px_0px_0px_rgba(0,0,0,0.3)]">
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </div>

        <div id="modal-panel" class="hide absolute inset-0 bg-black/80 z-20 flex items-center justify-center p-4 backdrop-blur-xs">
            <div class="w-full max-w-sm app-card border-2 p-5 space-y-5 shadow-[6px_6px_0px_0px_rgba(16,185,129,0.2)]">
                <div class="flex justify-between items-center border-b-2 border-custom pb-2">
                    <h4 class="font-black text-xs uppercase tracking-widest text-emerald-500">// PARÂMETROS DA SALA</h4>
                    <button id="btn-close-panel" class="w-6 h-6 border border-custom flex items-center justify-center text-muted hover:text-white text-xs bg-black/20">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center gap-3 bg-black/20 p-2 border border-custom">
                        <div class="relative group w-11 h-11 border border-custom flex-shrink-0">
                            <img id="panel-user-avatar" src="" class="w-full h-full object-cover">
                            <label for="upload-avatar" class="absolute inset-0 bg-black/60 flex items-center justify-center text-white opacity-0 group-hover:opacity-100 cursor-pointer text-[10px] transition-all">
                                <i class="fas fa-pen"></i>
                            </label>
                            <input type="file" id="upload-avatar" accept="image/*" class="hidden">
                        </div>
                        <div class="overflow-hidden">
                            <span class="text-[8px] text-muted block font-black uppercase tracking-wider">Identidade Local</span>
                            <span id="panel-user-name" class="font-bold text-xs text-white truncate block">...</span>
                        </div>
                    </div>

                    <div id="adm-controls" class="hide space-y-3 pt-1 border-t border-dashed border-custom">
                        <div class="bg-amber-500/10 border border-amber-500/30 p-2 text-[9px] text-amber-500 font-black uppercase tracking-wider">
                            <i class="fas fa-shield-alt mr-1"></i> Modo Administrador Ativo
                        </div>
                        <div>
                            <label class="block text-[9px] font-black uppercase tracking-widest mb-1 text-muted">Alterar Nome do Canal</label>
                            <div class="flex gap-2">
                                <input type="text" id="panel-room-rename" class="flex-1 p-2 text-xs border border-custom bg-black/40 font-bold uppercase text-white outline-none focus:border-emerald-500">
                                <button id="btn-room-rename" class="bg-emerald-600 hover:bg-emerald-700 border border-emerald-400 text-white font-black px-3 text-[10px] uppercase">OK</button>
                            </div>
                        </div>
                        <button id="btn-room-clear" class="w-full bg-red-950/20 border border-red-500/40 hover:border-red-500 text-red-400 hover:text-red-500 font-black p-2 text-[10px] uppercase tracking-wider transition-all">
                            <i class="fas fa-trash-alt mr-1"></i> Expurgar Histórico de Mensagens
                        </button>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[9px] font-black uppercase tracking-widest text-muted">// Integrantes na Sala</label>
                        <div id="panel-members-list" class="max-h-32 overflow-y-auto space-y-1 pr-1 border border-custom p-1 bg-black/20"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb",
            measurementId: "G-TLJ87EYNFP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentRoom = null;
        let userRole = "Membro";
        let activeReplyId = null;
        let activeEditId = null;
        let unsubRoomMessages = null;
        let unsubRoomMeta = null;
        let unsubRoomUsers = null;

        const scrLogin = document.getElementById("screen-login");
        const scrLobby = document.getElementById("screen-lobby");
        const scrChat = document.getElementById("screen-chat");

        const inputLoginNick = document.getElementById("login-nickname");
        const btnLogin = document.getElementById("btn-login");
        
        const lobbyAvatar = document.getElementById("lobby-avatar");
        const lobbyWelcome = document.getElementById("lobby-welcome");
        const inputRoomName = document.getElementById("room-name");
        const inputRoomPass = document.getElementById("room-pass");
        const btnJoinRoom = document.getElementById("btn-join-room");
        const btnLogout = document.getElementById("btn-logout");

        const chatRoomTitle = document.getElementById("chat-room-title");
        const chatUserRole = document.getElementById("chat-user-role");
        const chatMessages = document.getElementById("chat-messages");
        const msgInput = document.getElementById("msg-input");
        const btnSend = document.getElementById("btn-send");
        const btnBackLobby = document.getElementById("btn-back-lobby");
        
        const replyPreview = document.getElementById("reply-preview");
        const replyUser = document.getElementById("reply-user");
        const replyText = document.getElementById("reply-text");
        const btnCancelReply = document.getElementById("btn-cancel-reply");

        const editIndicator = document.getElementById("edit-indicator");
        const btnCancelEdit = document.getElementById("btn-cancel-edit");

        const modalPanel = document.getElementById("modal-panel");
        const btnOpenPanel = document.getElementById("btn-open-panel");
        const btnClosePanel = document.getElementById("btn-close-panel");
        const panelUserAvatar = document.getElementById("panel-user-avatar");
        const panelUserName = document.getElementById("panel-user-name");
        const uploadAvatar = document.getElementById("upload-avatar");
        const admControls = document.getElementById("adm-controls");
        const panelRoomRename = document.getElementById("panel-room-rename");
        const btnRoomRename = document.getElementById("btn-room-rename");
        const btnRoomClear = document.getElementById("btn-room-clear");
        const panelMembersList = document.getElementById("panel-members-list");

        msgInput.addEventListener("input", () => {
            msgInput.style.height = "auto";
            msgInput.style.height = msgInput.scrollHeight + "px";
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, `users/${user.uid}`));
                if (snapshot.exists()) {
                    currentUser = snapshot.val();
                    showScreen("lobby");
                } else {
                    await signOut(auth);
                    showScreen("login");
                }
            } else {
                showScreen("login");
            }
        });

        btnLogin.addEventListener("click", async () => {
            const nickname = inputLoginNick.value.trim();
            if (!nickname) return alert("Digite seu apelido familiar!");

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                currentUser = {
                    uid: user.uid,
                    name: nickname,
                    email: user.email,
                    avatar: user.photoURL || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop"
                };

                await set(ref(db, `users/${user.uid}`), currentUser);
                showScreen("lobby");
            } catch (err) {
                alert("Falha: " + err.message);
            }
        });

        btnLogout.addEventListener("click", () => {
            signOut(auth).then(() => {
                currentUser = null;
                showScreen("login");
            });
        });

        function showScreen(screen) {
            scrLogin.classList.add("hide");
            scrLobby.classList.add("hide");
            scrChat.classList.add("hide");

            if (screen === "login") {
                scrLogin.classList.remove("hide");
            } else if (screen === "lobby") {
                scrLobby.classList.remove("hide");
                lobbyWelcome.innerText = currentUser.name;
                lobbyAvatar.src = currentUser.avatar;
            } else if (screen === "chat") {
                scrChat.classList.remove("hide");
            }
        }

        btnJoinRoom.addEventListener("click", async () => {
            const rawRoom = inputRoomName.value.trim().toLowerCase();
            const pass = inputRoomPass.value.trim();

            if (!rawRoom || !pass) return alert("Preencha todos os campos!");
            const roomName = rawRoom.replace(/[^a-z0-9_-]/g, "");

            const roomRef = ref(db, `rooms/${roomName}`);
            const snapshot = await get(roomRef);

            if (!snapshot.exists()) {
                const newRoom = {
                    meta: {
                        name: roomName,
                        password: pass,
                        createdBy: currentUser.uid
                    }
                };
                await set(roomRef, newRoom);
                enterRoom(roomName, "ADM");
            } else {
                const roomData = snapshot.val();
                if (roomData.meta.password !== pass) {
                    return alert("Chave de segurança incorreta!");
                }
                const role = roomData.meta.createdBy === currentUser.uid ? "ADM" : "Membro";
                enterRoom(roomName, role);
            }
        });

        async function enterRoom(roomName, role) {
            currentRoom = roomName;
            userRole = role;
            
            chatRoomTitle.innerText = roomName;
            chatUserRole.innerText = role;
            if(role === "ADM") {
                chatUserRole.className = "text-[8px] font-black px-1.5 py-0.5 border border-amber-500 bg-amber-500/10 text-amber-500 tracking-widest uppercase";
            } else {
                chatUserRole.className = "text-[8px] font-black px-1.5 py-0.5 border border-emerald-500 bg-emerald-500/10 text-emerald-500 tracking-widest uppercase";
            }

            panelUserName.innerText = currentUser.name;
            panelUserAvatar.src = currentUser.avatar;
            panelRoomRename.value = roomName;

            if (role === "ADM") {
                admControls.classList.remove("hide");
            } else {
                admControls.classList.add("hide");
            }

            await set(ref(db, `rooms/${roomName}/users/${currentUser.uid}`), {
                uid: currentUser.uid,
                name: currentUser.name,
                avatar: currentUser.avatar,
                role: role
            });

            showScreen("chat");
            listenRoom(roomName);
        }

        function listenRoom(roomName) {
            if (unsubRoomMessages) unsubRoomMessages();
            if (unsubRoomMeta) unsubRoomMeta();
            if (unsubRoomUsers) unsubRoomUsers();

            unsubRoomMeta = onValue(ref(db, `rooms/${roomName}/meta`), (snapshot) => {
                if (!snapshot.exists()) {
                    exitRoomForce();
                    return;
                }
                const meta = snapshot.val();
                chatRoomTitle.innerText = meta.name;
                currentRoom = meta.name;
            });

            unsubRoomUsers = onValue(ref(db, `rooms/${roomName}/users`), (snapshot) => {
                if (!snapshot.exists()) return;
                const users = snapshot.val();
                
                if (!users[currentUser.uid]) {
                    exitRoomForce();
                    alert("Você foi removido da sala.");
                    return;
                }

                userRole = users[currentUser.uid].role;
                chatUserRole.innerText = userRole;

                panelMembersList.innerHTML = "";
                Object.values(users).forEach(u => {
                    const item = document.createElement("div");
                    item.className = "flex items-center justify-between bg-black/40 p-2 border border-custom text-xs";
                    
                    let kickBtn = "";
                    if (userRole === "ADM" && u.uid !== currentUser.uid) {
                        kickBtn = `<button class="text-red-400 hover:text-red-500 text-[9px] font-black border border-red-500/20 px-1.5 py-0.5 uppercase bg-red-500/5 btn-kick" data-uid="${u.uid}">Banir</button>`;
                    }

                    item.innerHTML = `
                        <div class="flex items-center gap-2 overflow-hidden pr-1">
                            <img src="${u.avatar}" class="w-6 h-6 border border-custom object-cover">
                            <span class="font-bold truncate text-slate-300">${u.name} <span class="text-[8px] text-muted">[${u.role}]</span></span>
                        </div>
                        ${kickBtn}
                    `;
                    panelMembersList.appendChild(item);
                });

                document.querySelectorAll(".btn-kick").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        const targetUid = e.currentTarget.getAttribute("data-uid");
                        remove(ref(db, `rooms/${currentRoom}/users/${targetUid}`));
                    });
                });
            });

            unsubRoomMessages = onValue(ref(db, `rooms/${roomName}/messages`), (snapshot) => {
                chatMessages.innerHTML = "";
                if (!snapshot.exists()) return;

                const msgs = snapshot.val();
                Object.keys(msgs).forEach(id => {
                    const m = msgs[id];
                    const isMe = m.senderId === currentUser.uid;
                    
                    const msgDiv = document.createElement("div");
                    msgDiv.className = `max-w-[88%] border p-2.5 relative group flex flex-col ${isMe ? "msg-out self-end border-emerald-500/40" : "msg-in self-start border-slate-700"}`;
                    
                    let replyMarkup = "";
                    if (m.replyTo) {
                        replyMarkup = `
                            <div class="border-l-2 border-emerald-400 bg-black/30 px-2 py-0.5 text-[10px] mb-1.5 opacity-80 pointer-events-none">
                                <span class="font-black block text-emerald-400 text-[8px] uppercase">${m.replyTo.user}</span>
                                <p class="truncate text-slate-400">${m.replyTo.text}</p>
                            </div>
                        `;
                    }

                    let actionMenu = "";
                    const canEdit = isMe;
                    const canDelete = isMe || userRole === "ADM";

                    actionMenu = `
                        <div class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 flex gap-1.5 bg-black/80 border border-custom px-1.5 py-0.5 text-[9px] text-white transition-all">
                            <button class="act-reply" data-id="${id}" data-user="${m.senderName}" data-text="${m.text}"><i class="fas fa-reply text-slate-400"></i></button>
                            ${canEdit ? `<button class="act-edit" data-id="${id}" data-text="${m.text}"><i class="fas fa-pen text-amber-500"></i></button>` : ""}
                            ${canDelete ? `<button class="act-del" data-id="${id}"><i class="fas fa-trash text-red-400"></i></button>` : ""}
                        </div>
                    `;

                    msgDiv.innerHTML = `
                        ${replyMarkup}
                        <span class="text-[9px] font-black text-emerald-400 block mb-0.5 uppercase tracking-wide">${m.senderName}</span>
                        <p class="text-xs whitespace-pre-wrap break-words pr-2 font-medium leading-relaxed">${m.text}</p>
                        <div class="flex items-center justify-end gap-1 mt-1 text-[8px] text-muted font-bold self-end">
                            ${m.edited ? "<span>[EDITADA]</span>" : ""}
                            <span>${m.time}</span>
                        </div>
                        ${actionMenu}
                    `;
                    chatMessages.appendChild(msgDiv);
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;

                document.querySelectorAll(".act-reply").forEach(b => b.addEventListener("click", e => {
                    activeReplyId = e.currentTarget.getAttribute("data-id");
                    replyUser.innerText = e.currentTarget.getAttribute("data-user");
                    replyText.innerText = e.currentTarget.getAttribute("data-text");
                    replyPreview.classList.remove("hide");
                }));

                document.querySelectorAll(".act-edit").forEach(b => b.addEventListener("click", e => {
                    activeEditId = e.currentTarget.getAttribute("data-id");
                    msgInput.value = e.currentTarget.getAttribute("data-text");
                    editIndicator.classList.remove("hide");
                    msgInput.focus();
                }));

                document.querySelectorAll(".act-del").forEach(b => b.addEventListener("click", e => {
                    const mid = e.currentTarget.getAttribute("data-id");
                    remove(ref(db, `rooms/${currentRoom}/messages/${mid}`));
                }));
            });
        }

        async function exitRoomForce() {
            if (unsubRoomMessages) unsubRoomMessages();
            if (unsubRoomMeta) unsubRoomMeta();
            if (unsubRoomUsers) unsubRoomUsers();
            
            modalPanel.classList.add("hide");
            showScreen("lobby");
            currentRoom = null;
        }

        btnBackLobby.addEventListener("click", async () => {
            if (currentRoom) {
                await remove(ref(db, `rooms/${currentRoom}/users/${currentUser.uid}`));
            }
            exitRoomForce();
        });

        btnCancelReply.addEventListener("click", () => {
            activeReplyId = null;
            replyPreview.classList.add("hide");
        });

        btnCancelEdit.addEventListener("click", () => {
            activeEditId = null;
            msgInput.value = "";
            editIndicator.classList.add("hide");
        });

        btnSend.addEventListener("click", async () => {
            const text = msgInput.value.trim();
            if (!text) return;

            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (activeEditId) {
                await update(ref(db, `rooms/${currentRoom}/messages/${activeEditId}`), {
                    text: text,
                    edited: true
                });
                activeEditId = null;
                editIndicator.classList.add("hide");
            } else {
                let replyPayload = null;
                if (activeReplyId) {
                    replyPayload = {
                        user: replyUser.innerText,
                        text: replyText.innerText
                    };
                }

                const msgRef = push(ref(db, `rooms/${currentRoom}/messages`));
                await set(msgRef, {
                    senderId: currentUser.uid,
                    senderName: currentUser.name,
                    text: text,
                    time: timeStr,
                    replyTo: replyPayload
                });

                activeReplyId = null;
                replyPreview.classList.add("hide");
            }

            msgInput.value = "";
            msgInput.style.height = "auto";
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        btnOpenPanel.addEventListener("click", () => modalPanel.classList.remove("hide"));
        btnClosePanel.addEventListener("click", () => modalPanel.classList.add("hide"));

        uploadAvatar.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64 = reader.result;
                currentUser.avatar = base64;
                
                await update(ref(db, `users/${currentUser.uid}`), { avatar: base64 });
                await update(ref(db, `rooms/${currentRoom}/users/${currentUser.uid}`), { avatar: base64 });
                
                panelUserAvatar.src = base64;
                lobbyAvatar.src = base64;
            };
            reader.readAsDataURL(file);
        });

        btnRoomRename.addEventListener("click", async () => {
            if (userRole !== "ADM") return;
            const newNameRaw = panelRoomRename.value.trim().toLowerCase();
            const newName = newNameRaw.replace(/[^a-z0-9_-]/g, "");
            if (!newName || newName === currentRoom) return;

            const oldRoom = currentRoom;
            const oldSnapshot = await get(ref(db, `rooms/${oldRoom}`));
            
            if (oldSnapshot.exists()) {
                const roomData = oldSnapshot.val();
                roomData.meta.name = newName;
                
                await set(ref(db, `rooms/${newName}`), roomData);
                await remove(ref(db, `rooms/${oldRoom}`));
                
                currentRoom = newName;
                chatRoomTitle.innerText = newName;
                listenRoom(newName);
                alert("Canal alterado!");
            }
        });

        btnRoomClear.addEventListener("click", async () => {
            if (userRole !== "ADM") return;
            if (confirm("Limpar mensagens?")) {
                await remove(ref(db, `rooms/${currentRoom}/messages`));
            }
        });
    </script>
</body>
</html>
