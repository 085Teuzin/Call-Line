<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSync Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #e50914;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TELA DE LOGIN / CRIAÇÃO DE SALA */
        #screen-login {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(18,18,18,1) 100%);
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 30px 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
        }

        .login-card h2 {
            margin-bottom: 24px;
            text-align: center;
            color: var(--primary);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #252525;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:active {
            background-color: #b80710;
        }

        /* TELA PRINCIPAL DO APP (SALA) */
        #screen-room {
            display: none; /* Começa escondida */
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* PLAYER DE VÍDEO */
        .video-container {
            position: relative;
            width: 100%;
            background-color: #000;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Custom Controls apenas para o ADM (Play/Pause/Speed) */
        .adm-controls {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 10px;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .adm-controls button, .adm-controls select {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .adm-controls button:active {
            background: var(--primary);
        }

        .room-info-bar {
            background-color: var(--card-bg);
            padding: 8px 12px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .badge-role {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-adm { background-color: #2e7d32; color: white; }
        .badge-membro { background-color: #1565c0; color: white; }

        /* SEÇÃO DO CHAT */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-box {
            background-color: var(--card-bg);
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 85%;
            width: fit-content;
            word-break: break-word;
            font-size: 14px;
        }

        .msg-user {
            font-weight: bold;
            color: var(--primary);
            font-size: 12px;
            margin-bottom: 2px;
        }

        .chat-input-area {
            padding: 10px;
            background-color: var(--card-bg);
            display: flex;
            gap: 8px;
            border-top: 1px solid #2a2a2a;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #333;
            background-color: #121212;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        /* CRÉDITOS E RODAPÉ */
        .credits {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 6px 0;
            background-color: var(--bg-color);
            border-top: 1px solid #1f1f1f;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="screen-login">
        <div class="login-card">
            <h2>CineSync</h2>
            <div class="input-group">
                <label for="input-name">Seu Nome / Apelido</label>
                <input type="text" id="input-name" placeholder="Ex: Teuzin">
            </div>
            <div class="input-group">
                <label for="input-room">Nome da Sala</label>
                <input type="text" id="input-room" placeholder="Ex: sala-dos-cria">
            </div>
            <div class="input-group">
                <label for="input-drive-link">Link do Vídeo (Google Drive)</label>
                <input type="text" id="input-drive-link" placeholder="Cole o link de compartilhamento aqui">
            </div>
            <button class="btn-submit" id="btn-enter">Criar / Entrar na Sala</button>
        </div>
    </div>

    <div id="screen-room">
        <div class="video-container">
            <video id="main-player" controls playsinline></video>
            
            <div class="adm-controls" id="adm-panel">
                <button onclick="rewindVideo()">-10s</button>
                <button onclick="forwardVideo()">+10s</button>
                <select id="video-speed" onchange="changeSpeed(this.value)">
                    <option value="1">1.0x (Normal)</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2.0x</option>
                </select>
                <span style="font-size: 11px; color: #fff; margin-left: auto;">Painel ADM</span>
            </div>
        </div>

        <div class="room-info-bar">
            <div>Sala: <b id="display-room-name">...</b></div>
            <div>Cargo: <span id="display-role" class="badge-role">...</span></div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Digite uma mensagem...">
                <button id="btn-send-msg">Enviar</button>
            </div>
        </div>

        <div class="credits">
            Made By: @085_Teuzinnn
        </div>
    </div>

    <script>
        // Configuração do seu Firebase que você enviou
        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb",
            measurementId: "G-TLJ87EYNFP"
        };

        // Inicializa o Firebase (Compat v10)
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Elementos da interface
        const screenLogin = document.getElementById('screen-login');
        const screenRoom = document.getElementById('screen-room');
        const videoPlayer = document.getElementById('main-player');
        const admPanel = document.getElementById('adm-panel');
        
        let username = "";
        let roomName = "";
        let isAdm = false;
        let userId = "user_" + Math.random().toString(36).substr(2, 9);
        let roomRef = null;
        let isSyncing = false; // Evita loops infinitos de atualização mútua

        // Função mágica para converter link do Google Drive em link direto de streaming
        function parseDriveLink(url) {
            if (!url) return "";
            // Procura pelo ID padrão do arquivo do drive
            const regExp = /\/d\/([^/]+)\/(?:view|edit)?/;
            const match = url.match(regExp);
            if (match && match[1]) {
                return `https://docs.google.com/uc?export=download&id=${match[1]}`;
            }
            return url; // Se não for link do drive, tenta usar o link puro enviado
        }

        // Evento do botão de entrar/criar sala
        document.getElementById('btn-enter').addEventListener('click', () => {
            username = document.getElementById('input-name').value.trim();
            roomName = document.getElementById('input-room').value.trim().toLowerCase().replace(/[^a-z0-9-_]/g, '');
            let driveLink = document.getElementById('input-drive-link').value.trim();

            if (!username || !roomName) {
                alert("Por favor, preencha seu nome e o nome da sala!");
                return;
            }

            roomRef = database.ref('rooms/' + roomName);

            // Verifica se a sala já existe ou precisa ser criada
            roomRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    // A sala existe -> Entra como membro
                    isAdm = false;
                    setupRoom();
                } else {
                    // A sala não existe -> Cria e vira ADM
                    if(!driveLink) {
                        alert("Como você está criando a sala, precisa inserir o link do vídeo do Google Drive!");
                        return;
                    }
                    isAdm = true;
                    const directVideoUrl = parseDriveLink(driveLink);

                    // Inicializa os dados da nova sala no Firebase
                    roomRef.set({
                        adminId: userId,
                        videoUrl: directVideoUrl,
                        status: {
                            currentTime: 0,
                            paused: true,
                            playbackRate: 1,
                            timestamp: Date.now()
                        }
                    }).then(() => {
                        setupRoom();
                    });
                }
            });
        });

        // Configura e abre a interface da sala sincronizada
        function setupRoom() {
            screenLogin.style.display = 'none';
            screenRoom.style.display = 'flex';
            document.getElementById('display-room-name').innerText = roomName;
            
            const roleBadge = document.getElementById('display-role');
            if (isAdm) {
                roleBadge.innerText = "ADM";
                roleBadge.className = "badge-role badge-adm";
                admPanel.style.display = 'flex';
                setupAdminListeners();
            } else {
                roleBadge.innerText = "Membro";
                roleBadge.className = "badge-role badge-membro";
                setupMemberListeners();
            }

            // Pega o link do vídeo salvo na sala e carrega no Player
            roomRef.child('videoUrl').once('value', (snapshot) => {
                videoPlayer.src = snapshot.val();
                videoPlayer.load();
            });

            // Ativa o sistema de chat em tempo real
            setupChat();
        }

        // ==========================================
        // LÓGICA DO ADMINISTRADOR (ENVIA COMANDOS)
        // ==========================================
        function updateFirebaseVideoState() {
            if (!isAdm || isSyncing) return;
            roomRef.child('status').set({
                currentTime: videoPlayer.currentTime,
                paused: videoPlayer.paused,
                playbackRate: videoPlayer.playbackRate,
                timestamp: Date.now()
            });
        }

        function setupAdminListeners() {
            // Escuta eventos locais do player do ADM e avisa o Firebase
            videoPlayer.addEventListener('play', updateFirebaseVideoState);
            videoPlayer.addEventListener('pause', updateFirebaseVideoState);
            videoPlayer.addEventListener('seeked', updateFirebaseVideoState);
        }

        // Funções dos botões exclusivos do painel do ADM
        function forwardVideo() { videoPlayer.currentTime += 10; updateFirebaseVideoState(); }
        function rewindVideo() { videoPlayer.currentTime -= 10; updateFirebaseVideoState(); }
        function changeSpeed(val) { videoPlayer.playbackRate = parseFloat(val); updateFirebaseVideoState(); }


        // ==========================================
        // LÓGICA DO MEMBRO (RECEBE COMANDOS)
        // ==========================================
        function setupMemberListeners() {
            // Escuta mudanças feitas pelo ADM no Firebase
            roomRef.child('status').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                isSyncing = true;

                // Bloqueia ações diretas do membro alterando o player baseado no Firebase
                videoPlayer.playbackRate = data.playbackRate;

                // Calcula a latência caso o vídeo esteja rodando para compensar atrasos de rede
                let targetTime = data.currentTime;
                if (!data.paused) {
                    const latency = (Date.now() - data.timestamp) / 1000;
                    targetTime += latency;
                }

                // Sincroniza a barra de progresso do vídeo se a diferença for maior que 1.5 segundos
                if (Math.abs(videoPlayer.currentTime - targetTime) > 1.5) {
                    videoPlayer.currentTime = targetTime;
                }

                // Sincroniza Play/Pause
                if (data.paused && !videoPlayer.paused) {
                    videoPlayer.pause();
                } else if (!data.paused && videoPlayer.paused) {
                    videoPlayer.play().catch(() => {
                        // Trata bloqueio de autoplay de navegadores mobile
                        console.log("Autoplay bloqueado. Aguardando interação do usuário.");
                    });
                }

                isSyncing = false;
            });

            // Se um membro atrevido tentar dar play ou pause localmente pelo player nativo, ele volta pro estado do Firebase
            videoPlayer.addEventListener('play', () => {
                if (!isAdm && !isSyncing) {
                    roomRef.child('status').once('value', (snap) => {
                        if(snap.val().paused) videoPlayer.pause();
                    });
                }
            });
            videoPlayer.addEventListener('pause', () => {
                if (!isAdm && !isSyncing) {
                    roomRef.child('status').once('value', (snap) => {
                        if(!snap.val().paused) videoPlayer.play().catch(()=>{});
                    });
                }
            });
        }

        // ==========================================
        // LÓGICA DO CHAT (PARA AMBOS)
        // ==========================================
        function setupChat() {
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const btnSend = document.getElementById('btn-send-msg');

            // Envia Mensagem
            function sendMsg() {
                const text = chatInput.value.trim();
                if(!text) return;

                roomRef.child('chat').push({
                    user: username,
                    message: text,
                    timestamp: Date.now()
                });
                chatInput.value = "";
            }

            btnSend.addEventListener('click', sendMsg);
            chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

            // Recebe Mensagens em tempo real
            roomRef.child('chat').limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                
                const msgBox = document.createElement('div');
                msgBox.className = "msg-box";
                
                const userSpan = document.createElement('div');
                userSpan.className = "msg-user";
                userSpan.innerText = data.user;

                const textSpan = document.createElement('span');
                textSpan.innerText = data.message;

                msgBox.appendChild(userSpan);
                msgBox.appendChild(textSpan);
                chatMessages.appendChild(msgBox);

                // Força o scroll para a última mensagem enviada
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }
    </script>
</body>
</html>
